name: Build APK
on:
  push:
    branches:
      - main
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install
        run: |
          npm install
          npm install @capacitor/cli @capacitor/android @capacitor/core
      - name: Sync
        run: npx cap sync android
      - name: Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: APK-File
          path: android/app/build/outputs/apk/debug/app-debug.apk
